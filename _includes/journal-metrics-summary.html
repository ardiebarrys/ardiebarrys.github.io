<style>
  .journal-summary-section {
    width: 100%;
    margin: 1.5rem 0 2.2rem;
  }

  .journal-summary-header {
    margin-bottom: 1rem;
  }

  .journal-summary-header h2 {
    margin: 0;
    color: #0b174f;
    font-size: 1.45rem;
    font-weight: 700;
  }

  .journal-visuals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.2rem;
    margin-bottom: 1.4rem;
  }

  .journal-chart-card {
    padding: 1.1rem 1.2rem;
    border: 1px solid rgba(183, 0, 183, 0.22);
    border-left: 5px solid var(--global-theme-color);
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(183, 0, 183, 0.08), rgba(183, 0, 183, 0.02));
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.06);
  }

  .journal-chart-card h3 {
    margin: 0 0 0.9rem;
    color: #0b174f;
    font-size: 1.05rem;
    font-weight: 700;
  }

  .donut-layout {
    display: grid;
    grid-template-columns: 150px 1fr;
    gap: 1rem;
    align-items: center;
  }

  .donut-chart {
    position: relative;
    width: 150px;
    height: 150px;
  }

  .donut-chart svg {
    width: 150px;
    height: 150px;
    overflow: visible;
    transform: rotate(-90deg);
  }

  .donut-track {
    fill: none;
    stroke: #e8e8e8;
    stroke-width: 18;
  }

  .donut-segment {
    fill: none;
    stroke-width: 18;
    stroke-linecap: butt;
    cursor: pointer;
  }

  .donut-segment:hover {
    stroke-width: 21;
  }

  .donut-center {
    position: absolute;
    inset: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0b174f;
    font-weight: 700;
    text-align: center;
    pointer-events: none;
  }

  .donut-legend {
    display: grid;
    gap: 0.45rem;
  }

  .donut-legend-item {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    color: #222222;
    font-size: 0.95rem;
    line-height: 1.35;
  }

  .donut-swatch {
    width: 0.8rem;
    height: 0.8rem;
    border-radius: 50%;
    flex: 0 0 auto;
  }

  .donut-tooltip {
    position: fixed;
    z-index: 9999;
    display: none;
    max-width: 240px;
    padding: 0.45rem 0.65rem;
    border: 1px solid rgba(183, 0, 183, 0.22);
    border-radius: 8px;
    background: #ffffff;
    color: #111111;
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
    font-size: 0.9rem;
    line-height: 1.35;
    pointer-events: none;
  }

  .journal-table-wrap {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border: 1px solid rgba(183, 0, 183, 0.18);
    border-radius: 10px;
    background: #ffffff;
  }

  .journal-metrics-table {
    width: 100%;
    min-width: 1080px;
    table-layout: auto;
    border-collapse: collapse;
    border-spacing: 0;
  }

  .journal-metrics-table th,
  .journal-metrics-table td {
    padding: 0.75rem 0.9rem;
    border-right: 0 !important;
    border-left: 0 !important;
    border-bottom: 1px solid #eeeeee;
    color: #111111;
    font-size: 0.95rem;
    line-height: 1.35;
    vertical-align: top;
  }

  .journal-metrics-table th {
    background: rgba(183, 0, 183, 0.08);
    color: #0b174f;
    font-weight: 700;
    text-align: left;
    white-space: nowrap;
  }

  .journal-metrics-table th:nth-child(1),
  .journal-metrics-table td:nth-child(1) {
    width: 4rem;
  }

  .journal-metrics-table th:nth-child(2),
  .journal-metrics-table td:nth-child(2) {
    min-width: 260px;
  }

  .journal-metrics-table th:nth-child(3),
  .journal-metrics-table td:nth-child(3) {
    min-width: 130px;
    white-space: nowrap;
  }

  .journal-metrics-table th:nth-child(4),
  .journal-metrics-table td:nth-child(4) {
    min-width: 250px;
  }

  .journal-metrics-table th:nth-child(5),
  .journal-metrics-table td:nth-child(5) {
    min-width: 90px;
  }

  .journal-metrics-table th:nth-child(6),
  .journal-metrics-table td:nth-child(6) {
    min-width: 100px;
  }

  .journal-metrics-table th:nth-child(7),
  .journal-metrics-table td:nth-child(7) {
    min-width: 100px;
  }

  .journal-metrics-table th:nth-child(8),
  .journal-metrics-table td:nth-child(8) {
    min-width: 120px;
  }

  .journal-metrics-table td.number-cell,
  .journal-metrics-table th.number-cell {
    text-align: right;
  }

  .journal-metrics-table tbody tr:last-child td {
    border-bottom: 0;
  }

  .journal-metrics-table tbody tr:hover {
    background: rgba(183, 0, 183, 0.035);
  }

  .table-sort-button {
    display: inline-grid;
    grid-template-columns: 1fr 1.1rem;
    align-items: center;
    gap: 0.3rem;
    width: 100%;
    min-width: 0;
    padding: 0;
    border: 0;
    background: transparent;
    color: #0b174f;
    font: inherit;
    font-weight: 700;
    text-align: inherit;
    cursor: pointer;
  }

  .table-sort-arrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.1rem;
    height: 1.1rem;
    border: 1px solid rgba(183, 0, 183, 0.24);
    border-radius: 50%;
    color: var(--global-theme-color);
    font-size: 0.72rem;
    line-height: 1;
    background: #ffffff;
  }

  .table-sort-button:hover .table-sort-arrow,
  .table-sort-button.active .table-sort-arrow {
    border-color: var(--global-theme-color);
    background: rgba(183, 0, 183, 0.08);
  }

  .quartile-badge {
    display: inline-flex;
    min-width: 2.4rem;
    justify-content: center;
    padding: 0.18rem 0.45rem;
    border-radius: 999px;
    background: rgba(183, 0, 183, 0.09);
    color: var(--global-theme-color);
    font-weight: 700;
  }

  @media (max-width: 900px) {
    .journal-visuals {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 600px) {
    .donut-layout {
      grid-template-columns: 1fr;
      justify-items: center;
    }

    .donut-legend {
      width: 100%;
    }
  }
</style>

<section class="journal-summary-section">
  <div class="journal-summary-header">
    <h2>Journal Metrics Summary</h2>
  </div>

  <div class="journal-visuals">
    <div class="journal-chart-card">
      <h3>Papers by Field / Category</h3>
      <div class="donut-layout">
        <div id="category-donut" class="donut-chart">
          <svg viewBox="0 0 160 160" aria-hidden="true">
            <circle class="donut-track" cx="80" cy="80" r="58"></circle>
            <g class="donut-segments"></g>
          </svg>
          <div class="donut-center">11<br>Papers</div>
        </div>
        <div id="category-legend" class="donut-legend"></div>
      </div>
    </div>

    <div class="journal-chart-card">
      <h3>Papers by Quartile</h3>
      <div class="donut-layout">
        <div id="quartile-donut" class="donut-chart">
          <svg viewBox="0 0 160 160" aria-hidden="true">
            <circle class="donut-track" cx="80" cy="80" r="58"></circle>
            <g class="donut-segments"></g>
          </svg>
          <div class="donut-center">11<br>Papers</div>
        </div>
        <div id="quartile-legend" class="donut-legend"></div>
      </div>
    </div>
  </div>

  <div id="donut-tooltip" class="donut-tooltip"></div>

  <div class="journal-table-wrap">
    <table class="journal-metrics-table">
      <thead>
        <tr>
          <th class="number-cell">No.</th>
          <th>Journal</th>
          <th class="number-cell">
            <button class="table-sort-button" data-sort="papers">
              <span>No. of Papers</span>
              <span class="table-sort-arrow">↕</span>
            </button>
          </th>
          <th>Field / Category</th>
          <th>Indexing</th>
          <th class="number-cell">
            <button class="table-sort-button" data-sort="jif">
              <span>JIF 2025</span>
              <span class="table-sort-arrow">↕</span>
            </button>
          </th>
          <th>
            <button class="table-sort-button" data-sort="quartile">
              <span>Quartile</span>
              <span class="table-sort-arrow">↕</span>
            </button>
          </th>
          <th>Rank</th>
        </tr>
      </thead>
      <tbody id="journal-table-body"></tbody>
    </table>
  </div>
</section>

<script>
  (function () {
    const journalData = [
      { no: 1, journal: "Archives of Toxicology", papers: 2, category: "Toxicology", indexing: "SCIE", jif: 10.9, quartile: "Q1", rank: "5/106" },
      { no: 2, journal: "Diabetes, Obesity and Metabolism", papers: 1, category: "Endocrinology & Metabolism", indexing: "SCIE", jif: 6.1, quartile: "Q1", rank: "32/198" },
      { no: 3, journal: "Toxicology", papers: 1, category: "Toxicology", indexing: "SCIE", jif: 5.2, quartile: "Q1", rank: "16/106" },
      { no: 4, journal: "Environmental Toxicology and Pharmacology", papers: 1, category: "Toxicology", indexing: "SCIE", jif: 4.6, quartile: "Q1", rank: "23/106" },
      { no: 5, journal: "Progress in Biophysics and Molecular Biology", papers: 1, category: "Biophysics", indexing: "SCIE", jif: 4.5, quartile: "Q1", rank: "13/81" },
      { no: 6, journal: "Molecular and Cellular Endocrinology", papers: 1, category: "Endocrinology & Metabolism", indexing: "SCIE", jif: 3.4, quartile: "Q2", rank: "95/198" },
      { no: 7, journal: "Toxicology Mechanisms and Methods", papers: 2, category: "Toxicology", indexing: "SCIE", jif: 2.9, quartile: "Q3", rank: "57/106" },
      { no: 8, journal: "International Journal of Impotence Research", papers: 1, category: "Urology & Nephrology", indexing: "SCIE", jif: 2.5, quartile: "Q2", rank: "54/134" },
      { no: 9, journal: "Journal of Public Health-Heidelberg", papers: 1, category: "Public, Environmental & Occupational Health", indexing: "ESCI", jif: 1.6, quartile: "Q3", rank: "301/443" }
    ];

    const chartColors = ["#253a7d", "#b700b7", "#367bd6", "#0e9f7a", "#e08a32", "#c94f5f"];
    const sortState = { key: null, direction: "default" };

    function renderJournalTable(rows) {
      const tbody = document.getElementById("journal-table-body");

      tbody.innerHTML = rows
        .map(function (item, index) {
          return `
            <tr>
              <td class="number-cell">${index + 1}</td>
              <td>${item.journal}</td>
              <td class="number-cell">${item.papers}</td>
              <td>${item.category}</td>
              <td>${item.indexing}</td>
              <td class="number-cell">${item.jif.toFixed(1)}</td>
              <td><span class="quartile-badge">${item.quartile}</span></td>
              <td>${item.rank}</td>
            </tr>
          `;
        })
        .join("");
    }

    function groupByPapers(key) {
      return journalData.reduce(function (groups, item) {
        groups[item[key]] = (groups[item[key]] || 0) + item.papers;
        return groups;
      }, {});
    }

    function renderLegend(containerId, groups) {
      const legend = document.getElementById(containerId);

      legend.innerHTML = Object.entries(groups)
        .map(function ([label, value], index) {
          return `
            <div class="donut-legend-item">
              <span class="donut-swatch" style="background:${chartColors[index % chartColors.length]}"></span>
              <span>${label}: <strong>${value}</strong></span>
            </div>
          `;
        })
        .join("");
    }

    function easeOutQuart(value) {
      return 1 - Math.pow(1 - value, 4);
    }

    function animateDonut(donutId, groups) {
      const donut = document.getElementById(donutId);
      const segmentGroup = donut.querySelector(".donut-segments");
      const tooltip = document.getElementById("donut-tooltip");
      const radius = 58;
      const circumference = 2 * Math.PI * radius;
      const entries = Object.entries(groups);
      const total = entries.reduce(function (sum, entry) {
        return sum + entry[1];
      }, 0);

      let accumulatedLength = 0;

      segmentGroup.innerHTML = entries
        .map(function ([label, value], index) {
          const length = (value / total) * circumference;
          const color = chartColors[index % chartColors.length];
          const startOffset = accumulatedLength;
          const gap = entries.length > 1 ? 3 : 0;
          const visibleLength = Math.max(0, length - gap);

          accumulatedLength += length;

          return `
            <circle
              class="donut-segment"
              cx="80"
              cy="80"
              r="${radius}"
              stroke="${color}"
              stroke-dasharray="0 ${circumference}"
              stroke-dashoffset="${-startOffset}"
              data-label="${label}"
              data-value="${value}"
              data-total="${total}"
              data-start="${startOffset}"
              data-length="${visibleLength}">
            </circle>
          `;
        })
        .join("");

      const segments = donut.querySelectorAll(".donut-segment");

      segments.forEach(function (segment) {
        segment.addEventListener("mouseenter", function () {
          const label = segment.dataset.label;
          const value = Number(segment.dataset.value);
          const totalValue = Number(segment.dataset.total);
          const percent = ((value / totalValue) * 100).toFixed(1);

          tooltip.innerHTML = `<strong>${label}</strong><br>${value} papers (${percent}%)`;
          tooltip.style.display = "block";
        });

        segment.addEventListener("mousemove", function (event) {
          tooltip.style.left = event.clientX + 14 + "px";
          tooltip.style.top = event.clientY + 14 + "px";
        });

        segment.addEventListener("mouseleave", function () {
          tooltip.style.display = "none";
        });
      });

      let start = null;
      const duration = 1800;

      function step(timestamp) {
        if (!start) start = timestamp;

        const elapsed = timestamp - start;
        const progress = easeOutQuart(Math.min(elapsed / duration, 1));
        const globalVisibleLength = circumference * progress;

        segments.forEach(function (segment) {
          const startOffset = Number(segment.dataset.start);
          const segmentLength = Number(segment.dataset.length);
          const visibleLength = Math.max(
            0,
            Math.min(segmentLength, globalVisibleLength - startOffset)
          );

          segment.setAttribute(
            "stroke-dasharray",
            `${visibleLength} ${circumference - visibleLength}`
          );
        });

        if (progress < 1) {
          requestAnimationFrame(step);
        }
      }

      requestAnimationFrame(step);
    }

    function getNextSortDirection(buttonKey) {
      if (sortState.key !== buttonKey) return "desc";
      if (sortState.direction === "desc") return "asc";
      if (sortState.direction === "asc") return "default";
      return "desc";
    }

    function sortJournalData(sortType, direction) {
      const rows = [...journalData];

      if (direction === "default") return rows;

      if (sortType === "quartile") {
        rows.sort(function (a, b) {
          const result = a.quartile.localeCompare(b.quartile) || b.jif - a.jif;
          return direction === "asc" ? result : -result;
        });
      }

      if (sortType === "jif") {
        rows.sort(function (a, b) {
          return direction === "asc" ? a.jif - b.jif : b.jif - a.jif;
        });
      }

      if (sortType === "papers") {
        rows.sort(function (a, b) {
          const result = b.papers - a.papers || b.jif - a.jif;
          return direction === "asc" ? -result : result;
        });
      }

      return rows;
    }

    function updateSortButtons(activeButton, direction) {
      document.querySelectorAll(".table-sort-button").forEach(function (button) {
        button.classList.remove("active");
        button.querySelector(".table-sort-arrow").textContent = "↕";
      });

      if (direction === "desc") {
        activeButton.classList.add("active");
        activeButton.querySelector(".table-sort-arrow").textContent = "↓";
      }

      if (direction === "asc") {
        activeButton.classList.add("active");
        activeButton.querySelector(".table-sort-arrow").textContent = "↑";
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      const categoryGroups = groupByPapers("category");
      const quartileGroups = groupByPapers("quartile");

      renderJournalTable(journalData);
      renderLegend("category-legend", categoryGroups);
      renderLegend("quartile-legend", quartileGroups);
      animateDonut("category-donut", categoryGroups);
      animateDonut("quartile-donut", quartileGroups);

      document.querySelectorAll(".table-sort-button").forEach(function (button) {
        button.addEventListener("click", function () {
          const sortKey = button.dataset.sort;
          const nextDirection = getNextSortDirection(sortKey);

          sortState.key = nextDirection === "default" ? null : sortKey;
          sortState.direction = nextDirection;

          updateSortButtons(button, nextDirection);
          renderJournalTable(sortJournalData(sortKey, nextDirection));
        });
      });
    });
  })();
</script>
